<svg width="800" height="80" viewBox="0 0 800 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="waveGrad" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00FFF0" />
      <stop offset="50%" stop-color="#7928CA" />
      <stop offset="100%" stop-color="#FF007A" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Pulsing, waving path -->
  <g filter="url(#glow)">
    <path d="M 0,30 Q 100,10 200,30 T 400,30 T 600,30 T 800,30 T 1000,30 T 1200,30" stroke="url(#waveGrad)" stroke-width="3" fill="none" stroke-linecap="round">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="-400,0" dur="4s" repeatCount="indefinite" />
    </path>
  </g>
  
  <text x="400" y="65" font-family="'Inter', sans-serif" font-size="12" fill="#8B949E" text-anchor="middle">
    Built with ⚡ for Google Antigravity Community
  </text>
</svg>
